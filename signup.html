<title>Sign up — Gumly</title>
<style>
  :root{
    --orange:#FE781A; --orange-deep:#E8650A; --orange-dark:#C4530A;
    --peach:#FED6C0; --badge-bg:#FDF1C6; --badge-text:#C97A00;
    --bg:#F4EFEC; --white:#FFFFFF; --ink:#1A1A1A; --muted:#6E6C68; --line:#EAE2DA;
    --blue-tint:#DDF3F7; --purple-tint:#EEE7FE; --green-tint:#E1F5E6; --pink-tint:#FCE4EC;
    --max:1240px;
    --shadow-3d:0 1px 1px rgba(60,35,10,.04),0 4px 6px rgba(60,35,10,.05),0 12px 20px rgba(60,35,10,.08),0 32px 48px rgba(60,35,10,.12);
    --shadow-3d-hover:0 2px 2px rgba(60,35,10,.05),0 8px 12px rgba(60,35,10,.07),0 24px 36px rgba(60,35,10,.11),0 56px 80px rgba(60,35,10,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1100px 600px at 85% -5%, rgba(254,120,26,.14), transparent 60%),
      radial-gradient(900px 700px at -10% 40%, rgba(254,214,192,.35), transparent 60%),
      var(--bg);
    -webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;
  }
  h1,h2,h3{letter-spacing:-0.02em;line-height:1.05;font-weight:800;}
  a{color:inherit;text-decoration:none;}
  ul{list-style:none;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 32px;}
  img,svg{display:block;}
  :focus-visible{outline:3px solid var(--orange-deep);outline-offset:2px;}

  /* NAV — floating 3D bar */
  header{position:sticky;top:14px;z-index:100;padding:0 20px;}
  nav{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 22px;max-width:var(--max);margin:0 auto;
    background:rgba(255,255,255,.82);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.9);border-radius:22px;box-shadow:var(--shadow-3d);
  }
  .logo{font-weight:800;font-size:22px;color:var(--orange);display:flex;align-items:center;gap:9px;}
  .logo .mark{
    height:38px;width:38px;border-radius:12px;
    background:var(--white);box-shadow:0 6px 14px rgba(60,35,10,.18);
    position:relative;overflow:hidden;display:block;
  }
  .logo .mark img{position:absolute;left:8.55px;top:6.33px;width:28.5px;height:28.5px;}
  .nav-tabs{display:flex;align-items:center;gap:4px;}
  .nav-tab{padding:10px 16px;border-radius:13px;font-size:14.5px;font-weight:600;color:var(--muted);transition:all .18s ease;}
  .nav-tab.active,.nav-tab:hover{color:var(--orange);background:var(--badge-bg);box-shadow:inset 0 1px 3px rgba(201,122,0,.12);}
  .nav-actions{display:flex;align-items:center;gap:10px;}

  /* BUTTONS — physical depth */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:13px 24px;border-radius:999px;font-weight:700;font-size:14.5px;
    transition:transform .16s ease, box-shadow .16s ease, background .2s ease;white-space:nowrap;}
  .btn-ghost{color:var(--ink);background:var(--white);border:1px solid var(--line);box-shadow:0 2px 5px rgba(60,35,10,.06);}
  .btn-ghost:hover{transform:translateY(-2px);box-shadow:0 8px 16px rgba(60,35,10,.1);}
  .btn-solid{background:linear-gradient(180deg,#FF8A35,var(--orange) 55%,var(--orange-deep));color:var(--white);
    box-shadow:0 3px 0 var(--orange-dark), 0 10px 22px rgba(254,120,26,.4);}
  .btn-solid:hover{transform:translateY(-2px);box-shadow:0 5px 0 var(--orange-dark), 0 16px 30px rgba(254,120,26,.5);}
  .btn-solid:active{transform:translateY(1px);box-shadow:0 1px 0 var(--orange-dark), 0 6px 14px rgba(254,120,26,.4);}
  .btn-solid[disabled]{opacity:.65;cursor:not-allowed;transform:none;}
  .btn-outline{background:rgba(255,255,255,.6);color:var(--orange);border:1.5px solid var(--orange);}
  .btn-outline:hover{background:var(--badge-bg);transform:translateY(-2px);}
  .btn-lg{padding:17px 32px;font-size:16px;}

  /* AUTH-AWARE HEADER STATES */
  .nav-actions[data-authstate="loading"] .auth-guest,
  .nav-actions[data-authstate="loading"] .auth-user{visibility:hidden;}
  .nav-actions .auth-user{display:none;align-items:center;gap:12px;}
  .nav-actions[data-authstate="in"] .auth-guest{display:none;}
  .nav-actions[data-authstate="in"] .auth-user{display:flex;}
  .nav-actions[data-authstate="out"] .auth-user{display:none;}
  .user-chip{display:flex;align-items:center;gap:9px;background:var(--white);border:1px solid var(--line);
    padding:7px 14px 7px 7px;border-radius:999px;font-size:13.5px;font-weight:700;color:var(--ink);
    box-shadow:0 3px 8px rgba(60,35,10,.08);}
  .user-chip .avatar{width:26px;height:26px;border-radius:50%;
    background:linear-gradient(180deg,#FF8A35,var(--orange));color:var(--white);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;
    box-shadow:inset 0 1px 1px rgba(255,255,255,.4);}

  /* AUTH PAGES — 3D card */
  .auth-shell{min-height:calc(100vh - 100px);display:flex;align-items:center;justify-content:center;
    padding:60px 24px;position:relative;perspective:1400px;}
  .auth-card{
    position:relative;z-index:2;width:100%;max-width:450px;background:var(--white);
    border-radius:28px;padding:44px 40px;
    box-shadow:var(--shadow-3d-hover), inset 0 1px 0 rgba(255,255,255,.9);
    transform:rotateX(1.5deg);transform-style:preserve-3d;
    transition:transform .3s ease;
  }
  .auth-card:hover{transform:rotateX(0deg);}
  .auth-card::after{content:"";position:absolute;inset:0;border-radius:28px;
    background:linear-gradient(120deg, rgba(255,255,255,.5), transparent 35%);pointer-events:none;}
  .auth-card .logo{margin-bottom:22px;}
  .auth-card h1{font-size:28px;margin-bottom:8px;}
  .auth-card .sub{font-size:14.5px;color:var(--muted);margin-bottom:30px;line-height:1.5;}

  /* FORMS — inset 3D fields */
  .form-group{margin-bottom:16px;}
  .form-group label{display:block;font-size:13px;font-weight:700;margin-bottom:7px;color:var(--ink);}
  .form-group input,.form-group select,.form-group textarea{
    width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid var(--line);
    background:var(--bg);font-size:16px;font-family:inherit;color:var(--ink);outline:none;
    box-shadow:inset 0 2px 5px rgba(60,35,10,.07);
    transition:border-color .15s ease, background .15s ease, box-shadow .15s ease;}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{
    border-color:var(--orange);background:var(--white);
    box-shadow:inset 0 1px 3px rgba(60,35,10,.05), 0 0 0 4px rgba(254,120,26,.14);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-role-toggle{display:flex;gap:10px;margin-bottom:20px;}
  .role-option{flex:1;border:1.5px solid var(--line);border-radius:14px;padding:14px;text-align:center;
    cursor:pointer;font-size:14px;font-weight:700;color:var(--muted);
    background:var(--white);box-shadow:0 2px 5px rgba(60,35,10,.05);
    transition:all .18s ease;}
  .role-option:hover{transform:translateY(-2px);}
  .role-option.selected{border-color:var(--orange);background:var(--badge-bg);color:var(--orange-deep);
    box-shadow:inset 0 2px 5px rgba(201,122,0,.15);transform:translateY(0);}
  .form-submit{width:100%;justify-content:center;margin-top:8px;}
  .form-divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:var(--muted);font-size:13px;}
  .form-divider::before,.form-divider::after{content:"";flex:1;height:1px;background:var(--line);}
  .btn-google{width:100%;justify-content:center;background:var(--white);border:1.5px solid var(--line);color:var(--ink);
    box-shadow:0 2px 5px rgba(60,35,10,.06);}
  .btn-google:hover{transform:translateY(-2px);box-shadow:0 8px 16px rgba(60,35,10,.1);}
  .auth-switch{text-align:center;margin-top:24px;font-size:14px;color:var(--muted);}
  .auth-switch a{color:var(--orange);font-weight:700;}
  .form-alert{display:none;padding:12px 16px;border-radius:12px;font-size:13.5px;font-weight:600;margin-bottom:18px;
    box-shadow:0 3px 8px rgba(60,35,10,.06);}
  .form-alert.show{display:block;}
  .form-alert.error{background:#FCE7E1;color:#C23B1E;}
  .form-alert.success{background:var(--green-tint);color:#1F7A3D;}
  .spinner{width:16px;height:16px;border-radius:50%;border:2.5px solid rgba(255,255,255,.4);
    border-top-color:#fff;display:inline-block;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* PAGE SHELL (book / dashboard) */
  .page-shell{max-width:900px;margin:0 auto;padding:56px 32px 90px;}
  .page-head{margin-bottom:36px;}
  .page-head h1{font-size:32px;}
  .page-head p{margin-top:8px;color:var(--muted);font-size:15.5px;}
  .card{background:var(--white);border-radius:26px;padding:36px;margin-bottom:24px;
    box-shadow:var(--shadow-3d), inset 0 1px 0 rgba(255,255,255,.9);position:relative;}
  .card::after{content:"";position:absolute;inset:0;border-radius:26px;
    background:linear-gradient(120deg, rgba(255,255,255,.45), transparent 35%);pointer-events:none;}
  .card > *{position:relative;z-index:2;}
  .guard-gate{max-width:470px;margin:90px auto;text-align:center;padding:48px 38px;
    background:var(--white);border-radius:28px;box-shadow:var(--shadow-3d-hover);}
  .guard-gate h2{font-size:22px;margin-bottom:10px;}
  .guard-gate p{color:var(--muted);font-size:14.5px;margin-bottom:26px;line-height:1.55;}

  /* DASHBOARD */
  .dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:30px;}
  .dash-stat{background:var(--white);border-radius:20px;padding:24px;box-shadow:var(--shadow-3d);
    transition:transform .2s ease, box-shadow .2s ease;}
  .dash-stat:hover{transform:translateY(-5px);box-shadow:var(--shadow-3d-hover);}
  .dash-stat .n{font-size:28px;font-weight:800;color:var(--orange);}
  .dash-stat .l{font-size:13px;color:var(--muted);font-weight:600;margin-top:4px;}
  .booking-row{background:var(--white);border-radius:20px;padding:18px 22px;
    display:flex;align-items:center;gap:16px;margin-bottom:14px;
    box-shadow:var(--shadow-3d);transition:transform .18s ease, box-shadow .18s ease;}
  .booking-row:hover{transform:translateY(-4px) scale(1.01);box-shadow:var(--shadow-3d-hover);}
  .booking-row .ico{width:50px;height:50px;border-radius:15px;background:var(--peach);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:23px;
    box-shadow:0 6px 12px rgba(60,35,10,.1), inset 0 -3px 5px rgba(0,0,0,.05), inset 0 2px 2px rgba(255,255,255,.7);}
  .booking-row .info{flex:1;min-width:0;}
  .booking-row .info h3{font-size:15.5px;font-weight:700;}
  .booking-row .info p{font-size:13px;color:var(--muted);margin-top:2px;}
  .booking-row .amt{font-size:16px;font-weight:800;text-align:right;}
  .status-pill{display:inline-block;font-size:11px;font-weight:700;padding:4px 11px;border-radius:999px;margin-top:6px;
    box-shadow:inset 0 1px 2px rgba(0,0,0,.08);}
  .status-pill.pending{background:var(--badge-bg);color:var(--badge-text);}
  .status-pill.confirmed{background:var(--blue-tint);color:#1D6FA5;}
  .status-pill.completed{background:var(--green-tint);color:#1F7A3D;}
  .status-pill.cancelled{background:#FCE4E4;color:#B23A2E;}
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-state .big-emoji{font-size:40px;margin-bottom:14px;}
  .skeleton{background:linear-gradient(90deg, var(--line) 25%, #F4F0EA 37%, var(--line) 63%);
    background-size:400% 100%;animation:shimmer 1.4s ease infinite;border-radius:20px;}
  @keyframes shimmer{0%{background-position:100% 50%;}100%{background-position:0 50%;}}

  @media (max-width:980px){
    .nav-tabs{display:none;}
    .dash-stats{grid-template-columns:1fr;}
    .form-row{grid-template-columns:1fr;}
  }
  @media (max-width:560px){
    .wrap{padding:0 20px;}
    .auth-card{padding:32px 26px;}
    .page-shell{padding:40px 20px 70px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important;animation-iteration-count:1 !important;transition-duration:0.001ms !important;}
    html{scroll-behavior:auto;}
    .auth-card{transform:none;}
  }
</style>
</head>

      <h1>Create your account</h1>
      <p class="sub">Book trusted pros, or join as one.</p>

      <div class="form-alert error" id="signupError"></div>
      <div class="form-alert success" id="signupSuccess"></div>

      <div class="form-role-toggle">
        <div class="role-option selected" data-role="homeowner">🏠 I need a service</div>
        <div class="role-option" data-role="technician">🧰 I'm a technician</div>
      </div>

      <form id="signupForm" onsubmit="return false;">
        <div class="form-row">
          <div class="form-group">
            <label for="fullName">Full name</label>
            <input type="text" id="fullName" placeholder="Jane Doe" required autocomplete="name">
          </div>
          <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" placeholder="(555) 123-4567" autocomplete="tel" data-numeric-input="phone" inputmode="tel">
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-solid form-submit" id="signupBtn">Create account</button>
      </form>

      <div class="form-divider">or</div>
      <button class="btn btn-google" id="googleBtn"><svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.6 29.3 35.5 24 35.5c-6.4 0-11.6-5.2-11.6-11.6S17.6 12.3 24 12.3c3 0 5.7 1.1 7.8 3l6-6C34.2 6 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 12.3 24 12.3c3 0 5.7 1.1 7.8 3l6-6C34.2 6 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.7 13.5-4.7l-6.2-5.3C29.3 35.6 26.8 36.5 24 36.5c-5.3 0-9.7-3-11.4-7.2l-6.5 5C9.5 39.8 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l6.2 5.3C40.5 36.4 44 30.9 44 24c0-1.2-.1-2.4-.4-3.5z"/></svg> Continue with Google</button>

      <div class="auth-switch">Already have an account? <a href="login.html">Log in</a></div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="gumly-app.js"></script>
<script>
  let selectedRole = new URLSearchParams(window.location.search).get("role") === "technician"
    ? "technician" : "homeowner";
  const roleOptions = document.querySelectorAll(".role-option");
  function renderRole(){ roleOptions.forEach(el => el.classList.toggle("selected", el.dataset.role === selectedRole)); }
  roleOptions.forEach(el => el.addEventListener("click", () => { selectedRole = el.dataset.role; renderRole(); }));
  renderRole();

  const form = document.getElementById("signupForm");
  const errorBox = document.getElementById("signupError");
  const successBox = document.getElementById("signupSuccess");
  const signupBtn = document.getElementById("signupBtn");

  function showError(m){ successBox.classList.remove("show"); errorBox.textContent = m; errorBox.classList.add("show"); }

  form.addEventListener("submit", async () => {
    errorBox.classList.remove("show"); successBox.classList.remove("show");
    const full_name = document.getElementById("fullName").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    signupBtn.disabled = true;
    signupBtn.innerHTML = '<span class="spinner"></span> Creating account…';

    const { data, error } = await GumlyAuth.signUp(email, password, { full_name, phone, role: selectedRole });

    signupBtn.disabled = false; signupBtn.textContent = "Create account";

    if (error) { showError(error.message || "Couldn't create your account."); return; }

    if (data?.session) {
      window.location.href = "dashboard.html";
    } else {
      successBox.textContent = "Check your email to confirm your account, then log in.";
      successBox.classList.add("show");
      form.reset();
    }
  });

  document.getElementById("googleBtn").addEventListener("click", async () => {
    const { error } = await GumlyAuth.signInWithGoogle("dashboard.html");
    if (error) showError(error.message || "Couldn't start Google sign-in.");
  });
</script>
</body>
</html>
